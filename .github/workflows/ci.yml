name: Java CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Package application
        run: |
              chmod +x mvnw
              ./mvnw clean package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: myrecipe-api-jar
          path: target/*.jar



  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myrecipe-api:${{ github.sha }} .

  docker-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/myrecipe-api:${{ github.sha }} .

      - name: Push image
        run: docker push ${{secrets.DOCKERHUB_USERNAME}}/myrecipe-api:${{github.sha}}

  deploy:
    runs-on: self-hosted
    needs: docker-push

    steps:
      - name: Copy docker compose
        uses: garygrossgarten/github-action-scp@release
        with:
          local: docker-compose.yml
          remote: /opt/myrecipe/docker-compose.yml
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          privateKey: ${{ secrets.SERVER_SSH_KEY }}

      - name: deploy
        uses: garygrossgarten/github-action-ssh@release
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          privateKey: ${{ secrets.SERVER_SSH_KEY}}
          command: |
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/myrecipe-api:${{ github.sha }}
            docker stop myrecipe-api || true
            docker rm myrecipe-api || true
            cd /opt/myrecipe
            docker compose up -d